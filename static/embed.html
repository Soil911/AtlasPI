<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AtlasPI Embed</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }
    #map { width: 100%; height: 100vh; }
    .embed-bar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
      background: rgba(13,17,23,0.92); backdrop-filter: blur(4px);
      padding: 6px 12px; display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid #30363d; font-size: 0.82em;
    }
    .embed-bar h1 { font-size: 1em; font-weight: 600; }
    .embed-bar h1 span { color: #58a6ff; }
    .embed-bar .year-display { color: #58a6ff; font-weight: 600; margin-left: auto; }
    .embed-bar a { color: #58a6ff; text-decoration: none; font-size: 0.85em; }
    .embed-bar a:hover { text-decoration: underline; }
    #year-slider { width: 200px; accent-color: #58a6ff; height: 3px; }
    .leaflet-control-attribution { font-size: 0.6em !important; background: rgba(13,17,23,0.7) !important; color: #8b949e !important; }
    .leaflet-control-attribution a { color: #58a6ff !important; }
    .leaflet-control-zoom a { background: #161b22 !important; color: #e6edf3 !important; border-color: #30363d !important; }
    .leaflet-tooltip { background: #161b22 !important; border: 1px solid #30363d !important; color: #e6edf3 !important; font-size: 0.82em !important; border-radius: 4px !important; }
  </style>
</head>
<body>
  <div class="embed-bar">
    <h1>Atlas<span>PI</span></h1>
    <input type="range" id="year-slider" min="-3100" max="2025" value="1500" step="1" />
    <span class="year-display" id="year-display">1500</span>
    <a href="/" target="_blank" title="Apri AtlasPI completo">Apri &#8599;</a>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const COLORS = { confirmed: '#3fb950', uncertain: '#d29922', disputed: '#f85149' };
    let map, layerGroup, allEntities = [];

    const params = new URLSearchParams(window.location.search);
    const initYear = params.get('year') ? parseInt(params.get('year'), 10) : 1500;
    const focusEntity = params.get('entity') ? parseInt(params.get('entity'), 10) : null;

    document.getElementById('year-slider').value = initYear;
    document.getElementById('year-display').textContent = fmtY(initYear);

    map = L.map('map', { center: [30, 20], zoom: 3, minZoom: 2, maxZoom: 12, zoomControl: true });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OSM &copy; CARTO',
      subdomains: 'abcd', maxZoom: 19,
    }).addTo(map);
    layerGroup = L.layerGroup().addTo(map);

    fetch('/v1/entities?limit=100&offset=0')
      .then(r => r.json())
      .then(data => {
        allEntities = data.entities;
        renderMap(initYear);
        if (focusEntity) {
          const e = allEntities.find(en => en.id === focusEntity);
          if (e && e.boundary_geojson && e.boundary_geojson.type !== 'Point') {
            map.fitBounds(L.geoJSON(e.boundary_geojson).getBounds(), { padding: [50, 80] });
          }
        }
      });

    document.getElementById('year-slider').addEventListener('input', function() {
      const year = parseInt(this.value, 10);
      document.getElementById('year-display').textContent = fmtY(year);
      renderMap(year);
    });

    function renderMap(year) {
      layerGroup.clearLayers();
      allEntities.forEach(e => {
        if (!e.boundary_geojson) return;
        if (e.year_start > year) return;
        if (e.year_end !== null && e.year_end < year) return;
        const c = COLORS[e.status] || '#8b949e';
        try {
          const geo = e.boundary_geojson;
          if (geo.type === 'Point') {
            const [lon, lat] = geo.coordinates;
            const m = L.circleMarker([lat, lon], { radius: 6, fillColor: c, color: '#fff', weight: 1, fillOpacity: 0.8 });
            m.bindTooltip(`<strong>${e.name_original}</strong><br>${e.entity_type}`);
            layerGroup.addLayer(m);
          } else {
            const pts = countPoints(geo);
            const real = pts > 50;
            const layer = L.geoJSON(geo, {
              style: { fillColor: c, fillOpacity: real ? 0.18 : 0.10, color: c, weight: real ? 2 : 1.5,
                       dashArray: e.status === 'disputed' ? '6,4' : (real ? null : '4,3'), opacity: real ? 0.8 : 0.5 },
            });
            layer.bindTooltip(`<strong>${e.name_original}</strong><br>${e.entity_type} &middot; ${Math.round(e.confidence_score*100)}%`, { sticky: true });
            layerGroup.addLayer(layer);
            const center = layer.getBounds().getCenter();
            layerGroup.addLayer(L.marker(center, {
              icon: L.divIcon({ className: '', html: `<div style="color:${c};font-size:10px;font-weight:600;text-shadow:0 0 3px #000;white-space:nowrap;pointer-events:none">${e.name_original}</div>`, iconSize: null, iconAnchor: [0,0] }),
              interactive: false,
            }));
          }
        } catch(_) {}
      });
    }

    function countPoints(g) {
      if (g.type === 'Polygon') return g.coordinates.reduce((s,r) => s+r.length, 0);
      if (g.type === 'MultiPolygon') return g.coordinates.reduce((s,p) => s+p.reduce((s2,r) => s2+r.length, 0), 0);
      return 0;
    }

    function fmtY(y) { return y < 0 ? Math.abs(y) + ' a.C.' : String(y); }
  </script>
</body>
</html>
