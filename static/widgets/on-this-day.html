<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AtlasPI - On This Day</title>
  <link rel="stylesheet" href="/static/widgets/widget.css">
</head>
<body>
  <div class="widget-container" id="root">
    <div class="widget-loading">Loading events...</div>
  </div>

  <script src="/static/widgets/widget.js"></script>
  <script>
    (async function () {
      var W = window.AtlasWidget;
      var root = document.getElementById('root');

      var dateStr = W.params.get('date') || W.todayMMDD();
      var displayDate = W.params.get('date') || W.todayFormatted();

      // Parse MM-DD for display if provided as parameter
      if (W.params.get('date')) {
        var parts = dateStr.split('-');
        var months = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];
        if (parts.length === 2) {
          displayDate = months[parseInt(parts[0], 10) - 1] + ' ' + parseInt(parts[1], 10);
        }
      }

      try {
        var data = await W.apiFetch('/v1/events/on-this-day/' + dateStr);
        var events = data.events || data;
        if (Array.isArray(data)) events = data;

        var html = '<div class="widget-header">';
        html += '<h1>On This Day</h1>';
        html += '<div class="otd-date">' + W.escapeHtml(displayDate) + '</div>';
        html += '</div>';

        html += '<div class="widget-body">';

        if (!events || events.length === 0) {
          html += '<div class="otd-empty">No events recorded for this date.<br>AtlasPI tracks events with known day-level precision.</div>';
        } else {
          html += '<div class="timeline-track">';
          for (var i = 0; i < events.length; i++) {
            var ev = events[i];
            html += '<div class="timeline-event">';
            html += '<div class="timeline-year">' + W.formatYear(ev.year) + '</div>';
            html += '<div class="timeline-dot"></div>';
            html += '<div class="timeline-content">';
            html += '<div class="timeline-name">' + W.escapeHtml(ev.name_original) + '</div>';
            html += '<div class="timeline-type">' + W.escapeHtml((ev.event_type || '').replace(/_/g, ' ')) + '</div>';
            html += '</div></div>';
          }
          html += '</div>';
        }

        html += '</div>';
        html += '<div class="powered-by"><a href="' + W.API_BASE + '" target="_blank">Powered by Atlas<span>PI</span></a></div>';

        root.innerHTML = html;
      } catch (e) {
        W.showError(root, 'Failed to load events for this date');
      }
    })();
  </script>
</body>
</html>
