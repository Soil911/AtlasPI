<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AtlasPI — OG Image Template (1200×630)</title>
<!--
  Render this file at exactly 1200×630 viewport, screenshot, save as og-image.png
  in the same folder. The og:image meta in index.html already points to that path.

  Quick render via headless Chrome:
    chrome --headless --disable-gpu --window-size=1200,630 \
      --screenshot=og-image.png file://$(pwd)/og-image.html

  Or open this file in a browser, set window to 1200×630, take a screenshot.
-->
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1200px; height: 630px;
    overflow: hidden;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    -webkit-font-smoothing: antialiased;
  }
  .frame {
    width: 1200px; height: 630px;
    position: relative;
    padding: 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    background:
      radial-gradient(ellipse 80% 60% at 80% 30%, rgba(88,166,255,0.18), transparent 70%),
      radial-gradient(ellipse 60% 50% at 20% 80%, rgba(121,192,255,0.10), transparent 70%),
      #0d1117;
    overflow: hidden;
  }

  /* Globe decoration */
  .globe {
    position: absolute;
    right: -120px; top: 50%;
    transform: translateY(-50%);
    width: 600px; height: 600px;
    opacity: 0.45;
  }
  .globe svg { width: 100%; height: 100%; }

  /* Grid overlay */
  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(88,166,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(88,166,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .top {
    position: relative; z-index: 2;
    display: flex; align-items: center; gap: 14px;
  }
  .logo-mark {
    width: 48px; height: 48px;
    color: #58a6ff;
  }
  .brand {
    font-size: 32px; font-weight: 700;
    letter-spacing: -0.02em;
  }
  .brand strong { color: #58a6ff; }
  .badge {
    margin-left: auto;
    padding: 6px 14px;
    background: rgba(88,166,255,0.12);
    border: 1px solid rgba(88,166,255,0.3);
    border-radius: 999px;
    font-size: 14px; font-weight: 600;
    color: #79c0ff;
    letter-spacing: 0.05em;
  }

  .center {
    position: relative; z-index: 2;
    max-width: 720px;
  }
  .eyebrow {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #58a6ff;
    margin-bottom: 18px;
  }
  h1 {
    font-size: 76px;
    line-height: 1.05;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 22px;
  }
  h1 .grad {
    background: linear-gradient(135deg, #58a6ff 0%, #79c0ff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .sub {
    font-size: 24px;
    line-height: 1.45;
    color: #c9d1d9;
    font-weight: 400;
  }

  .bottom {
    position: relative; z-index: 2;
    display: flex; gap: 36px;
    align-items: center;
  }
  .stat {
    display: flex; flex-direction: column;
  }
  .stat-num {
    font-size: 36px; font-weight: 800;
    color: #58a6ff;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .stat-lbl {
    font-size: 13px;
    color: #8b949e;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 6px;
  }
  .url {
    margin-left: auto;
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    font-size: 18px;
    color: #8b949e;
    padding: 8px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid #30363d;
    border-radius: 6px;
  }
</style>
</head>
<body>
<div class="frame">
  <div class="grid-bg"></div>

  <div class="globe" aria-hidden="true">
    <svg viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="30" stroke="#58a6ff" stroke-width="0.4" opacity="0.7"/>
      <ellipse cx="32" cy="32" rx="30" ry="10" stroke="#58a6ff" stroke-width="0.4" fill="none" opacity="0.5"/>
      <ellipse cx="32" cy="32" rx="30" ry="20" stroke="#58a6ff" stroke-width="0.4" fill="none" opacity="0.5"/>
      <line x1="32" y1="2" x2="32" y2="62" stroke="#58a6ff" stroke-width="0.4" opacity="0.5"/>
      <ellipse cx="32" cy="32" rx="10" ry="30" stroke="#58a6ff" stroke-width="0.4" fill="none" opacity="0.5"/>
      <ellipse cx="32" cy="32" rx="20" ry="30" stroke="#58a6ff" stroke-width="0.4" fill="none" opacity="0.5"/>
      <line x1="2" y1="32" x2="62" y2="32" stroke="#58a6ff" stroke-width="0.4" opacity="0.5"/>
    </svg>
  </div>

  <div class="top">
    <svg class="logo-mark" viewBox="0 0 64 64" fill="none">
      <circle cx="32" cy="32" r="28" fill="none" stroke="currentColor" stroke-width="2.5"/>
      <ellipse cx="32" cy="32" rx="28" ry="11" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
      <line x1="32" y1="4" x2="32" y2="60" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
      <ellipse cx="32" cy="32" rx="14" ry="28" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.6"/>
      <circle cx="32" cy="32" r="3" fill="currentColor"/>
    </svg>
    <span class="brand">Atlas<strong>PI</strong></span>
    <span class="badge">v5.8.0 · Live</span>
  </div>

  <div class="center">
    <div class="eyebrow">Historical Geography API</div>
    <h1>Built <span class="grad">for AI Agents</span>.<br>Honest with humans.</h1>
    <p class="sub">747 entities, real boundaries, academic sources. From 4500 BCE to 2024. REST API + MCP server.</p>
  </div>

  <div class="bottom">
    <div class="stat"><span class="stat-num">747</span><span class="stat-lbl">Entities</span></div>
    <div class="stat"><span class="stat-num">2,200+</span><span class="stat-lbl">Sources</span></div>
    <div class="stat"><span class="stat-num">21</span><span class="stat-lbl">Endpoints</span></div>
    <div class="stat"><span class="stat-num">4500 BCE → 2024</span><span class="stat-lbl">Coverage</span></div>
    <span class="url">atlaspi.cra-srl.com</span>
  </div>
</div>
</body>
</html>
