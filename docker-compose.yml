services:
  # ─── PostgreSQL + PostGIS ───────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: atlaspi
      POSTGRES_USER: atlaspi
      POSTGRES_PASSWORD: atlaspi_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlaspi -d atlaspi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── AtlasPI Application ───────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    ports:
      - "10100:10100"
    environment:
      - DATABASE_URL=postgresql://atlaspi:atlaspi_dev@db:5432/atlaspi
      - REDIS_URL=redis://redis:6379/0
      - HOST=0.0.0.0
      - PORT=10100
      - LOG_FORMAT=json
      - LOG_LEVEL=INFO
      - AUTO_SEED=true
      - CORS_ORIGINS=*
    volumes:
      - app-data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  app-data:
