services:
  # ─── PostgreSQL + PostGIS ───────────────────────────────────────
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: atlaspi
      POSTGRES_USER: atlaspi
      POSTGRES_PASSWORD: atlaspi_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlaspi -d atlaspi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── AtlasPI Application ───────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    ports:
      - "10100:10100"
    environment:
      - DATABASE_URL=postgresql://atlaspi:atlaspi_dev@db:5432/atlaspi
      - REDIS_URL=redis://redis:6379/0
      - HOST=0.0.0.0
      - PORT=10100
      - LOG_FORMAT=json
      - LOG_LEVEL=INFO
      - AUTO_SEED=true
      # In produzione restringere: CORS_ORIGINS=https://atlaspi.cra-srl.com
      - CORS_ORIGINS=*
      # Observability — passati se presenti nel .env del server
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-https://atlaspi.cra-srl.com}
      - RATE_LIMIT=${RATE_LIMIT:-60/minute}
    # NOTE (ETHICS-006 follow-up): /app/data is intentionally NOT a named volume.
    # Le batch JSON e i dataset raw vengono "bakati" nell'immagine al build
    # (Dockerfile `COPY data/ data/`). Un volume named lo maschererebbe e ogni
    # deploy vedrebbe dati stali dal primo `up`. Vedi docs/adr/ADR-003.
    volumes:
      - app-backup:/app/backup
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Backup sidecar (daily at 03:00) ────────────────────────────
  # Esegue scripts/backup.sh ogni 24h tramite sleep + loop.
  # Alternativa piu' pulita: usare host cron che invoca `docker exec app scripts/backup.sh`.
  backup:
    image: alpine:3.19
    restart: unless-stopped
    command: |
      sh -c '
        apk add --no-cache bash sqlite postgresql-client gzip coreutils;
        while true; do
          # attende fino alle 03:00 poi esegue backup
          NOW=$$(date +%H%M);
          SLEEP=$$((((3 - 10#$${NOW:0:2} + 24) % 24) * 3600 + (60 - 10#$${NOW:2:2}) * 60));
          echo "[backup-sidecar] next run in $${SLEEP}s";
          sleep $$SLEEP;
          bash /scripts/backup.sh /backup || echo "[backup-sidecar] backup fallito";
        done
      '
    volumes:
      - app-backup:/backup
      - ./scripts:/scripts:ro
    environment:
      - DATABASE_URL=postgresql://atlaspi:atlaspi_dev@db:5432/atlaspi
      - BACKUP_DIR=/backup
      - BACKUP_RETAIN=14
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  app-backup:
