# Alembic configuration for AtlasPI
#
# Supporta SQLite (dev) e PostgreSQL+PostGIS (prod).
# Il sqlalchemy.url viene sovrascritto da alembic/env.py usando src.config.DATABASE_URL.

[alembic]
script_location = alembic
prepend_sys_path = .

# Placeholder — sovrascritto da env.py con DATABASE_URL da src.config
sqlalchemy.url = sqlite:///data/atlaspi.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
